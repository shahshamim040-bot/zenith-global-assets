<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zenith Elite Command Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-[#030712] text-slate-100 font-sans min-h-screen">

    <div id="authBox" class="fixed inset-0 z-50 flex items-center justify-center bg-[#030712] p-6">
        <div class="w-full max-w-sm bg-[#0b0f19] p-8 rounded-3xl border border-white/10 text-center">
            <h2 class="text-xl font-black mb-6 uppercase text-blue-500">Master Authentication</h2>
            <input type="text" id="adminU" placeholder="Username" class="w-full bg-black p-3 rounded-xl mb-3 border border-slate-700">
            <input type="password" id="adminP" placeholder="Password" class="w-full bg-black p-3 rounded-xl mb-6 border border-slate-700">
            <button onclick="login()" class="w-full bg-blue-600 py-3 rounded-xl font-bold uppercase">Initialize</button>
        </div>
    </div>

    <div id="dash" class="hidden pb-20">
        <header class="p-4 border-b border-white/10 flex justify-between items-center">
            <h1 class="font-black text-blue-500">ZENITH COMMAND</h1>
            <button onclick="location.reload()" class="text-[10px] bg-red-900/30 px-3 py-1 rounded-full">EXIT</button>
        </header>

        <div class="p-4 space-y-4">
            <div class="bg-gradient-to-r from-blue-900 to-slate-900 p-6 rounded-2xl text-center">
                <p class="text-[9px] uppercase font-bold text-slate-400">Total Treasury</p>
                <h2 id="totalBal" class="text-3xl font-black mt-1">$0.00</h2>
            </div>

            <div id="tabMembers" class="tab-content active space-y-3">
                <h3 class="text-xs font-bold text-slate-500 uppercase px-1">Registered Members</h3>
                <div id="listMembers" class="space-y-3"></div>
            </div>

            <div id="tabDeposits" class="tab-content space-y-3">
                <h3 class="text-xs font-bold text-amber-500 uppercase px-1">Deposit Requests</h3>
                <div id="listDeposits" class="space-y-3"></div>
            </div>

            <div id="tabWithdraws" class="tab-content space-y-3">
                <h3 class="text-xs font-bold text-red-500 uppercase px-1">Withdraw Requests</h3>
                <div id="listWithdraws" class="space-y-3"></div>
            </div>

            <div id="tabSettings" class="tab-content space-y-3">
                <input type="text" id="bk" placeholder="bKash Number" class="w-full bg-[#0b0f19] p-3 rounded-lg text-sm border border-white/10">
                <input type="text" id="ng" placeholder="Nagad Number" class="w-full bg-[#0b0f19] p-3 rounded-lg text-sm border border-white/10">
                <button onclick="saveGateways()" class="w-full bg-emerald-700 py-3 rounded-lg font-bold text-sm">UPDATE AGENT NUMBERS</button>
            </div>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 bg-[#0b0f19] border-t border-white/10 p-4 flex justify-around">
            <button onclick="switchTab('tabMembers',this)" class="text-xs font-bold text-blue-500">MEMBERS</button>
            <button onclick="switchTab('tabDeposits',this)" class="text-xs font-bold text-slate-400">DEPOSIT</button>
            <button onclick="switchTab('tabWithdraws',this)" class="text-xs font-bold text-slate-400">WITHDRAW</button>
            <button onclick="switchTab('tabSettings',this)" class="text-xs font-bold text-slate-400">SETTINGS</button>
        </nav>
    </div>

    <script>
        const db = firebase.firestore();
        firebase.initializeApp({ apiKey: "AIzaSyC4K_nvbX_KY7dtSUkjiE0s1ixguBkqVkY", projectId: "zenith-global-assets" });

        function login() {
            if(document.getElementById('adminU').value=="shamim040" && document.getElementById('adminP').value=="12345"){
                document.getElementById('authBox').classList.add('hidden');
                document.getElementById('dash').classList.remove('hidden');
                init();
            }
        }

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function init() {
            // Load Members
            db.collection("users").onSnapshot(s => {
                let h = "", t = 0;
                s.forEach(d => {
                    let u = d.data();
                    t += (u.totalInvestment || 0);
                    h += `<div class="bg-[#0b0f19] p-4 rounded-xl border border-white/5 flex justify-between">
                        <div><p class="text-xs font-bold">${u.email}</p><p class="text-[9px] text-slate-500">Pass: ${u.password}</p></div>
                        <p class="text-emerald-400 font-bold">$${u.balance}</p>
                    </div>`;
                });
                document.getElementById('listMembers').innerHTML = h;
                document.getElementById('totalBal').innerText = "$"+t.toFixed(2);
            });

            // Load Deposits
            db.collection("deposits").where("status","==","pending").onSnapshot(s => {
                let h = "";
                s.forEach(d => {
                    h += `<div class="bg-[#0b0f19] p-4 rounded-xl border-l-4 border-amber-500">
                        <p class="text-xs font-bold">${d.data().email} : $${d.data().amount}</p>
                        <button onclick="upd('deposits','${d.id}','success')" class="mt-2 bg-blue-600 px-4 py-1 text-[10px] rounded">APPROVE</button>
                    </div>`;
                });
                document.getElementById('listDeposits').innerHTML = h;
            });

            // Load Withdraws
            db.collection("withdraws").where("status","==","pending").onSnapshot(s => {
                let h = "";
                s.forEach(d => {
                    h += `<div class="bg-[#0b0f19] p-4 rounded-xl border-l-4 border-red-500">
                        <p class="text-xs font-bold">${d.data().email} : $${d.data().amount}</p>
                        <button onclick="upd('withdraws','${d.id}','success')" class="mt-2 bg-green-600 px-4 py-1 text-[10px] rounded">PAY</button>
                    </div>`;
                });
                document.getElementById('listWithdraws').innerHTML = h;
            });
        }

        function upd(col, id, s) { db.collection(col).doc(id).update({status: s}).then(() => location.reload()); }
        function saveGateways() { 
            db.collection("settings").doc("gateways").set({bkash: document.getElementById('bk').value, nagad: document.getElementById('ng').value}, {merge:true});
            Swal.fire('Updated', '', 'success');
        }
    </script>
</body>
</html>
