<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zenith Command Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-[#030712] text-slate-100 font-sans min-h-screen pb-24">

    <div id="adminAuthScreen" class="flex min-h-screen flex-col justify-center items-center p-6 bg-gradient-to-b from-[#0b0f19] to-[#030712]">
        <div class="w-full max-w-sm bg-[#0b0f19] border border-white/10 p-5 rounded-2xl shadow-2xl backdrop-blur-lg">
            <input type="text" id="authAdminUser" placeholder="Terminal ID" class="w-full bg-[#030712] border border-white/10 rounded-xl px-4 py-3 mb-3 text-xs text-white outline-none">
            <input type="password" id="authAdminPass" placeholder="Access Passkey" class="w-full bg-[#030712] border border-white/10 rounded-xl px-4 py-3 mb-3 text-xs text-white outline-none">
            <button onclick="processAdminAuthentication()" class="w-full bg-emerald-600 text-slate-950 py-3 rounded-xl text-xs font-black uppercase">Unlock Console</button>
        </div>
    </div>

    <div id="adminMainDashboard" class="hidden min-h-screen flex flex-col">
        <header class="bg-[#0b0f19]/90 border-b border-white/10 p-4 sticky top-0 z-50 flex justify-between items-center backdrop-blur-md">
            <div>
                <h1 class="text-xs font-black uppercase text-white">Zenith Terminal</h1>
                <p class="text-[8px] text-emerald-400 font-mono" id="activeNodeDisplay"></p>
            </div>
            <button onclick="location.reload()" class="text-[9px] bg-red-950/40 border border-red-500/30 text-red-400 px-3 py-1.5 rounded-lg font-black uppercase">Exit</button>
        </header>

        <div class="p-4 max-w-md mx-auto w-full">
            <div class="bg-gradient-to-r from-emerald-950/30 to-teal-950/30 border border-emerald-500/20 p-4 rounded-xl text-center shadow-lg">
                <p class="text-[9px] text-slate-400 uppercase font-black tracking-widest">Company Treasury</p>
                <h2 class="text-2xl font-black text-emerald-400 mt-1" id="totalCorporateInvestment">$0.00</h2>
            </div>
        </div>

        <main class="p-4 max-w-md mx-auto w-full">
            <div id="tabMembers" class="tab-content active space-y-3">
                <div id="liveUsersRegistry" class="space-y-3"></div>
            </div>
            <div id="tabDeposits" class="tab-content space-y-3">
                <div id="liveDepositQueue" class="space-y-3"></div>
            </div>
            <div id="tabWithdraws" class="tab-content space-y-3">
                <div id="liveWithdrawQueue" class="space-y-3"></div>
            </div>
            <div id="tabSettings" class="tab-content space-y-4">
                <div class="bg-[#0b0f19] p-4 rounded-xl border border-white/5 space-y-3">
                    <input type="text" id="dbBkashNum" placeholder="bKash Number" class="w-full bg-[#030712] border border-white/10 rounded-lg p-3 text-xs">
                    <input type="text" id="dbNagadNum" placeholder="Nagad Number" class="w-full bg-[#030712] border border-white/10 rounded-lg p-3 text-xs">
                    <button onclick="saveGatewayNumbers()" class="w-full bg-emerald-600 py-3 rounded-lg font-black text-xs text-slate-950 uppercase">Save Agent Numbers</button>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 bg-[#0b0f19] border-t border-white/10 h-16 flex justify-around items-center z-50 px-2">
            <button onclick="switchTab('tabMembers', this)" class="text-emerald-400 font-bold text-[9px]"><i class="fa-solid fa-users block"></i> Members</button>
            <button onclick="switchTab('tabDeposits', this)" class="text-slate-400 font-bold text-[9px]"><i class="fa-solid fa-circle-down block"></i> Deposits</button>
            <button onclick="switchTab('tabWithdraws', this)" class="text-slate-400 font-bold text-[9px]"><i class="fa-solid fa-circle-up block"></i> Withdraw</button>
            <button onclick="switchTab('tabSettings', this)" class="text-slate-400 font-bold text-[9px]"><i class="fa-solid fa-sliders block"></i> Settings</button>
        </nav>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyC4K_nvbX_KY7dtSUkjiE0s1ixguBkqVkY", projectId: "zenith-global-assets" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function processAdminAuthentication() {
            if(document.getElementById('authAdminUser').value == "shamim040" && document.getElementById('authAdminPass').value == "12345") {
                document.getElementById('adminAuthScreen').classList.add('hidden');
                document.getElementById('adminMainDashboard').classList.remove('hidden');
                runLiveSyncModules();
            } else { Swal.fire('Error', 'Invalid Admin Access', 'error'); }
        }

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function runLiveSyncModules() {
            // মেম্বার লিস্ট ও টোটাল ব্যালেন্স
            db.collection("users").onSnapshot(s => {
                let html = "", total = 0;
                s.forEach(d => {
                    let u = d.data();
                    total += (u.totalInvestment || 0);
                    html += `<div class="bg-[#0b0f19] p-4 rounded-xl border border-white/10">
                        <p class="text-[10px] text-slate-400">User: ${u.email}</p>
                        <p class="text-xs font-bold">Pass: ${u.password} | Balance: $${(u.balance || 0).toFixed(2)}</p>
                    </div>`;
                });
                document.getElementById('liveUsersRegistry').innerHTML = html;
                document.getElementById('totalCorporateInvestment').innerText = "$"+total.toFixed(2);
            });

            // ডিপোজিট রিকোয়েস্ট
            db.collection("deposits").where("status", "==", "pending").onSnapshot(s => {
                let html = "";
                s.forEach(d => {
                    let v = d.data();
                    html += `<div class="bg-[#0b0f19] p-4 rounded-xl border border-amber-500/20">
                        <p class="text-xs font-bold text-amber-400">${v.email} | Amount: $${v.amount}</p>
                        <div class="flex gap-2 mt-2">
                            <button onclick="updateAction('deposits','${d.id}','success','${v.uid}',${v.amount})" class="bg-emerald-600 px-3 py-1 rounded text-[9px] font-black">APPROVE</button>
                            <button onclick="updateAction('deposits','${d.id}','failed','',0)" class="bg-red-900 px-3 py-1 rounded text-[9px] font-black">REJECT</button>
                        </div>
                    </div>`;
                });
                document.getElementById('liveDepositQueue').innerHTML = html;
            });

            // উইথড্র রিকোয়েস্ট
            db.collection("withdraws").where("status", "==", "pending").onSnapshot(s => {
                let html = "";
                s.forEach(d => {
                    let v = d.data();
                    html += `<div class="bg-[#0b0f19] p-4 rounded-xl border border-blue-500/20">
                        <p class="text-xs font-bold text-blue-400">${v.email} | Amount: $${v.amount}</p>
                        <button onclick="updateAction('withdraws','${d.id}','success','',0)" class="bg-blue-600 px-3 py-1 rounded text-[9px] font-black">MARK PAID</button>
                    </div>`;
                });
                document.getElementById('liveWithdrawQueue').innerHTML = html;
            });
        }

        function updateAction(col, id, stat, uid, amt) {
            db.collection(col).doc(id).update({status: stat}).then(() => {
                if(stat == 'success' && uid) {
                    const ref = db.collection("users").doc(uid);
                    ref.get().then(doc => {
                        let b = doc.data().balance || 0;
                        ref.update({balance: b + (col=='deposits'?amt:0)});
                    });
                }
                Swal.fire('Updated', 'Process Successful', 'success');
            });
        }

        function saveGatewayNumbers() {
            db.collection("settings").doc("gateways").set({
                bkash: document.getElementById('dbBkashNum').value,
                nagad: document.getElementById('dbNagadNum').value
            }, {merge:true}).then(() => Swal.fire('Success', 'Gateways Updated', 'success'));
        }
    </script>
</body>
</html>
