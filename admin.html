<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zenith Command Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-[#030712] text-slate-100 font-sans min-h-screen pb-24">

    <div id="adminAuthScreen" class="flex min-h-screen flex-col justify-center items-center p-6 bg-gradient-to-b from-[#0b0f19] to-[#030712]">
        <div class="w-full max-w-sm space-y-6 text-center">
            <div class="space-y-3">
                <div class="w-20 h-20 mx-auto bg-[#0b0f19] border border-white/10 rounded-2xl p-2 flex items-center justify-center shadow-2xl">
                    <img src="logo.png" alt="Zenith" class="w-full h-full object-contain rounded-xl" onerror="this.src='https://placehold.co/100x100/0f172a/059669?text=Zenith'">
                </div>
                <div>
                    <h2 class="text-xl font-black uppercase tracking-wider bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">Executive Node</h2>
                    <p class="text-[10px] text-emerald-400 font-mono uppercase tracking-widest mt-1">Authorized Mobile Terminal</p>
                </div>
            </div>

            <div class="bg-[#0b0f19] border border-white/10 p-5 rounded-2xl shadow-2xl space-y-4 backdrop-blur-lg">
                <div class="space-y-3 text-left">
                    <div>
                        <label class="block text-[9px] text-slate-400 uppercase font-black mb-1 tracking-wider">Terminal ID</label>
                        <input type="text" id="authAdminUser" class="w-full bg-[#030712] border border-white/10 rounded-xl px-4 py-2.5 text-xs text-white outline-none focus:border-emerald-500 font-mono">
                    </div>
                    <div>
                        <label class="block text-[9px] text-slate-400 uppercase font-black mb-1 tracking-wider">Access Passkey</label>
                        <input type="password" id="authAdminPass" class="w-full bg-[#030712] border border-white/10 rounded-xl px-4 py-2.5 text-xs text-white outline-none focus:border-emerald-500 font-mono">
                    </div>
                </div>
                <button onclick="processAdminAuthentication()" class="w-full bg-gradient-to-r from-emerald-600 to-teal-500 text-slate-950 py-3 rounded-xl text-xs font-black uppercase tracking-wider shadow-lg">
                    Unlock Console
                </button>
            </div>
        </div>
    </div>

    <div id="adminMainDashboard" class="hidden min-h-screen flex flex-col animate-fade-in">
        <header class="bg-[#0b0f19]/90 border-b border-white/10 p-3 sticky top-0 z-50 flex justify-between items-center backdrop-blur-md">
            <div class="flex items-center space-x-2.5">
                <div class="w-8 h-8 bg-slate-950 border border-white/10 p-1 rounded-lg">
                    <img src="logo.png" alt="Logo" class="w-full h-full object-contain" onerror="this.src='https://placehold.co/50x50/0f172a/059669?text=Z'">
                </div>
                <div>
                    <h1 class="text-xs font-black uppercase text-white tracking-wide">Zenith Terminal</h1>
                    <p class="text-[8px] text-emerald-400 font-mono" id="activeNodeDisplay">Node: shamim040</p>
                </div>
            </div>
            <button onclick="terminateAdminSession()" class="text-[9px] bg-red-950/40 border border-red-500/30 text-red-400 px-2.5 py-1.5 rounded-xl font-black uppercase">
                Exit
            </button>
        </header>

        <div class="p-4 max-w-md mx-auto w-full">
            <div class="bg-gradient-to-r from-emerald-950/30 to-teal-950/30 border border-emerald-500/20 p-4 rounded-xl text-center shadow-lg">
                <p class="text-[9px] text-slate-400 uppercase font-black tracking-widest">Total Corporate Investment Balance</p>
                <h2 class="text-2xl font-black text-emerald-400 mt-1" id="totalCorporateInvestment">$0.00</h2>
            </div>
        </div>

        <main class="p-4 max-w-md mx-auto w-full flex-1">
            
            <div id="tabMembers" class="tab-content active space-y-3">
                <h3 class="text-xs font-black uppercase text-slate-400 tracking-wider mb-2"><i class="fa-solid fa-users mr-1"></i> Registered Members Ledger</h3>
                <div id="liveUsersRegistry" class="space-y-3"></div>
            </div>

            <div id="tabDeposits" class="tab-content space-y-3">
                <h3 class="text-xs font-black uppercase text-amber-400 tracking-wider mb-2"><i class="fa-solid fa-circle-down mr-1"></i> Inbound Funding Queue</h3>
                <div id="liveDepositQueue" class="space-y-3"></div>
            </div>

            <div id="tabWithdraws" class="tab-content space-y-3">
                <h3 class="text-xs font-black uppercase text-blue-400 tracking-wider mb-2"><i class="fa-solid fa-circle-up mr-1"></i> Outbound Remittance Queue</h3>
                <div id="liveWithdrawQueue" class="space-y-3"></div>
            </div>

            <div id="tabSettings" class="tab-content space-y-4">
                <section class="bg-[#0b0f19] border border-white/5 rounded-xl p-4 shadow-xl space-y-3">
                    <h3 class="text-[11px] font-black text-emerald-400 uppercase tracking-wider border-b border-white/5 pb-1.5"><i class="fa-solid fa-money-bill-wave mr-1"></i> Change Agent Numbers</h3>
                    <div class="space-y-2.5">
                        <div>
                            <label class="block text-[8px] text-slate-400 uppercase font-bold mb-1">bKash Agent Number</label>
                            <input type="text" id="dbBkashNum" class="w-full bg-[#030712] border border-white/10 rounded-lg px-3 py-2 text-xs text-white font-mono outline-none focus:border-emerald-500">
                        </div>
                        <div>
                            <label class="block text-[8px] text-slate-400 uppercase font-bold mb-1">Nagad Agent Number</label>
                            <input type="text" id="dbNagadNum" class="w-full bg-[#030712] border border-white/10 rounded-lg px-3 py-2 text-xs text-white font-mono outline-none focus:border-emerald-500">
                        </div>
                        <button onclick="saveGatewayNumbers()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-2 rounded-lg font-black text-xs text-slate-950 uppercase tracking-wider transition">Save Parameters</button>
                    </div>
                </section>

                <section class="bg-[#0b0f19] border border-white/5 rounded-xl p-4 shadow-xl space-y-3">
                    <h3 class="text-[11px] font-black text-teal-400 uppercase tracking-wider border-b border-white/5 pb-1.5"><i class="fa-solid fa-user-shield mr-1"></i> Create Sub-Admin Account</h3>
                    <div class="space-y-2.5">
                        <div>
                            <label class="block text-[8px] text-slate-400 uppercase font-bold mb-1">Sub-Admin Username</label>
                            <input type="text" id="subUser" class="w-full bg-[#030712] border border-white/10 rounded-lg px-3 py-2 text-xs text-white outline-none focus:border-teal-500">
                        </div>
                        <div>
                            <label class="block text-[8px] text-slate-400 uppercase font-bold mb-1">Sub-Admin Password</label>
                            <input type="password" id="subPass" class="w-full bg-[#030712] border border-white/10 rounded-lg px-3 py-2 text-xs text-white outline-none focus:border-teal-500">
                        </div>
                        <button onclick="provisionSubAdmin()" class="w-full bg-teal-600 hover:bg-teal-500 py-2 rounded-lg font-black text-xs text-slate-950 uppercase tracking-wider transition">Deploy Sub-Admin</button>
                    </div>
                </section>

                <section class="bg-[#0b0f19] border border-white/5 rounded-xl p-3 shadow-xl space-y-2">
                    <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-wider"><i class="fa-solid fa-headset mr-1"></i> Synchronized Live Interaction Helpdesk</h3>
                    <div class="w-full h-[320px] rounded-lg overflow-hidden border border-white/5 bg-slate-950">
                        <iframe src="https://dashboard.tawk.to/" class="w-full h-full border-none"></iframe>
                    </div>
                </section>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 bg-[#0b0f19] border-t border-white/10 h-16 flex justify-around items-center z-50 px-2 shadow-2xl">
            <button onclick="switchTab('tabMembers', this)" class="flex flex-col items-center text-emerald-400 transition-all font-bold">
                <i class="fa-solid fa-users text-lg"></i><span class="text-[9px] mt-0.5 tracking-tighter">Members</span>
            </button>
            <button onclick="switchTab('tabDeposits', this)" class="flex flex-col items-center text-slate-400 transition-all font-bold">
                <i class="fa-solid fa-circle-down text-lg"></i><span class="text-[9px] mt-0.5 tracking-tighter">Deposits</span>
            </button>
            <button onclick="switchTab('tabWithdraws', this)" class="flex flex-col items-center text-slate-400 transition-all font-bold">
                <i class="fa-solid fa-circle-up text-lg"></i><span class="text-[9px] mt-0.5 tracking-tighter">Withdraw</span>
            </button>
            <button onclick="switchTab('tabSettings', this)" class="flex flex-col items-center text-slate-400 transition-all font-bold">
                <i class="fa-solid fa-sliders text-lg"></i><span class="text-[9px] mt-0.5 tracking-tighter">Settings</span>
            </button>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC4K_nvbX_KY7dtSUkjiE0s1ixguBkqVkY",
            authDomain: "zenith-global-assets.firebaseapp.com",
            projectId: "zenith-global-assets",
            storageBucket: "zenith-global-assets.firebasestorage.app",
            messagingSenderId: "818320822478",
            appId: "1:818320822478:web:ddd1e8f247bc3d81dfc09f",
            measurementId: "G-ZNGB5YV218"
        };
        
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        window.onload = function() {
            const currentAdminSession = localStorage.getItem("activeAdminToken");
            if (currentAdminSession) { initializeSecureConsole(currentAdminSession); }
        };

        function processAdminAuthentication() {
            const inputUser = document.getElementById('authAdminUser').value.trim();
            const inputPass = document.getElementById('authAdminPass').value.trim();

            if (inputUser === "shamim040" && inputPass === "12345") {
                localStorage.setItem("activeAdminToken", "shamim040");
                initializeSecureConsole("shamim040");
            } else {
                db.collection("sub_admins").doc(inputUser).get().then((doc) => {
                    if (doc.exists && doc.data().password === inputPass) {
                        localStorage.setItem("activeAdminToken", inputUser);
                        initializeSecureConsole(inputUser);
                    } else {
                        Swal.fire({ text: 'ভুল সিকিউরিটি ইউজারনেম অথবা পাসওয়ার্ড!', icon: 'error', background: '#0b0f19', color: '#fff' });
                    }
                });
            }
        }

        function initializeSecureConsole(adminNodeName) {
            document.getElementById('adminAuthScreen').classList.add('hidden');
            document.getElementById('adminMainDashboard').classList.remove('hidden');
            document.getElementById('activeNodeDisplay').innerText = "Node: " + adminNodeName;
            runLiveSyncModules();
        }

        function terminateAdminSession() {
            localStorage.removeItem("activeAdminToken");
            window.location.reload();
        }

        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            const navButtons = btn.parentElement.querySelectorAll('button');
            navButtons.forEach(b => { b.classList.remove('text-emerald-400'); b.classList.add('text-slate-400'); });
            btn.classList.remove('text-slate-400');
            btn.classList.add('text-emerald-400');
        }

        function runLiveSyncModules() {
            db.collection("users").onSnapshot(snapshot => {
                let corporateTotal = 0;
                let usersHtml = "";
                snapshot.forEach(doc => {
                    const user = doc.data();
                    const investment = parseFloat(user.totalInvestment) || 0;
                    corporateTotal += investment;
                    usersHtml += `<div class="bg-[#0b0f19] border border-white/5 p-3.5 rounded-xl space-y-2">
                        <p class="text-[8px] text-slate-500 uppercase font-black">User: ${user.email || 'N/A'}</p>
                        <div class="flex justify-between text-[10px]"><span class="text-slate-400">Balance:</span><strong class="text-emerald-400">$${(user.balance || 0).toFixed(2)}</strong></div>
                        <button onclick="modifyUserBalancePrompt('${doc.id}', ${user.balance || 0})" class="w-full bg-slate-800 text-[9px] py-1.5 rounded-lg font-bold uppercase">Modify</button>
                    </div>`;
                });
                document.getElementById('totalCorporateInvestment').innerText = "$" + corporateTotal.toFixed(2);
                document.getElementById('liveUsersRegistry').innerHTML = usersHtml;
            });

            // সংশোধন: 'Pending' (বড় হাতের P) ব্যবহার করা হয়েছে
            db.collection("deposits").orderBy("timestamp", "desc").onSnapshot(snapshot => {
                let html = "";
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if(data.status === "Pending") {
                        html += `<div class="bg-[#0b0f19] border border-amber-500/10 p-3.5 rounded-xl">
                            <p class="text-xs text-slate-200">${data.email}: $${data.amount}</p>
                            <button onclick="executeDepositAction('${doc.id}', '${data.uid}', ${data.amount})" class="w-full bg-emerald-600 text-xs py-2 mt-2 rounded-lg font-bold">Approve</button>
                        </div>`;
                    }
                });
                document.getElementById('liveDepositQueue').innerHTML = html || '<p class="text-center text-slate-500 text-xs">No pending deposits</p>';
            });

            db.collection("withdraws").orderBy("timestamp", "desc").onSnapshot(snapshot => {
                let html = "";
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if(data.status === "Pending") {
                        html += `<div class="bg-[#0b0f19] border border-blue-500/10 p-3.5 rounded-xl">
                            <p class="text-xs text-slate-200">Acc: ${data.accountNumber}: $${data.amount}</p>
                            <button onclick="executeWithdrawAction('${doc.id}', '${data.uid}', ${data.amount})" class="w-full bg-blue-600 text-xs py-2 mt-2 rounded-lg font-bold">Paid</button>
                        </div>`;
                    }
                });
                document.getElementById('liveWithdrawQueue').innerHTML = html || '<p class="text-center text-slate-500 text-xs">No pending withdrawals</p>';
            });
        }

        function executeDepositAction(docId, uid, amount) {
            db.collection("deposits").doc(docId).update({ status: "Success" }).then(() => {
                db.collection("users").doc(uid).update({ balance: firebase.firestore.FieldValue.increment(amount) });
                Swal.fire({ text: 'সফল!', icon: 'success' });
            });
        }

        function executeWithdrawAction(docId, uid, amount) {
            db.collection("withdraws").doc(docId).update({ status: "Success" }).then(() => {
                Swal.fire({ text: 'সফল!', icon: 'success' });
            });
        }

        function saveGatewayNumbers() {
            const bkash = document.getElementById('dbBkashNum').value.trim();
            const nagad = document.getElementById('dbNagadNum').value.trim();
            db.collection("settings").doc("gateways").set({ bkash, nagad }, { merge: true }).then(() => Swal.fire({ text: 'সেভ হয়েছে!', icon: 'success' }));
        }

        function provisionSubAdmin() {
            const user = document.getElementById('subUser').value.trim();
            const pass = document.getElementById('subPass').value.trim();
            db.collection("sub_admins").doc(user).set({ password: pass }).then(() => Swal.fire({ text: 'সাব-এডমিন তৈরি!', icon: 'success' }));
        }

        function modifyUserBalancePrompt(uid, currentBal) {
            Swal.fire({ title: 'Modify Balance', input: 'number', inputValue: currentBal, showCancelButton: true, confirmButtonColor: '#059669' }).then((result) => {
                if (result.isConfirmed) db.collection("users").doc(uid).update({ balance: parseFloat(result.value) }).then(() => Swal.fire({ text: 'আপডেট সফল!', icon: 'success' }));
            });
        }
    </script>
</body>
</html>
