<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Global | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: white; }
        .stat-card { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="bg-slate-950 min-h-screen">

    <nav class="p-6 flex justify-between items-center border-b border-slate-900">
        <h1 class="text-xl font-bold text-emerald-400">Zenith <span class="text-white text-sm">Global</span></h1>
        <button onclick="logout()" class="text-xs bg-red-900/20 text-red-400 px-4 py-2 rounded-full border border-red-900/50">Logout</button>
    </nav>

    <div class="p-6 max-w-4xl mx-auto space-y-6">
        <div class="stat-card p-8 rounded-[2rem] text-center">
            <p class="text-slate-400 text-xs uppercase tracking-widest mb-1">Portfolio Balance</p>
            <h2 class="text-5xl font-black text-white">$<span id="userBalance">0.00</span></h2>
            <p class="text-emerald-500 text-[10px] mt-4 font-bold uppercase">Welcome back, <span id="userName">Investor</span></p>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="stat-card p-6 rounded-3xl text-center hover:border-emerald-500/50 transition">
                <div class="bg-emerald-500/10 h-12 w-12 rounded-full flex items-center justify-center mx-auto mb-3">
                    <span class="text-emerald-400 text-xl font-bold">+</span>
                </div>
                <h3 class="font-bold text-sm">Deposit</h3>
                <p class="text-[9px] text-slate-500 mt-1">Fund your account securely.</p>
            </div>
            <div class="stat-card p-6 rounded-3xl text-center hover:border-orange-500/50 transition">
                <div class="bg-orange-500/10 h-12 w-12 rounded-full flex items-center justify-center mx-auto mb-3">
                    <span class="text-orange-400 text-xl font-bold">↑</span>
                </div>
                <h3 class="font-bold text-sm">Withdraw</h3>
                <p class="text-[9px] text-slate-500 mt-1">Instant payouts to your wallet.</p>
            </div>
        </div>

        <div class="bg-blue-900/10 border border-blue-900/30 p-4 rounded-2xl flex items-center space-x-4">
            <div class="text-blue-400 text-xl font-bold">ℹ</div>
            <div>
                <h4 class="text-xs font-bold text-blue-400">System Notification</h4>
                <p class="text-[10px] text-slate-400">Your assets are protected by end-to-end encryption protocols.</p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="main.js"></script>
</body>
</html>
